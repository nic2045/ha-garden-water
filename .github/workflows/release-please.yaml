name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release PR
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  update-blueprint-version:
    name: Stamp version into blueprint YAML
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update version string
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          BUILD=$(date +%y%m%d.%H%M)
          sed -E -i "s/Version: v[0-9]+\.[0-9]+\.[0-9]+ \(build [0-9.]+\)/Version: ${TAG} (build ${BUILD})/" garden_irrigation.yaml
      - name: Commit and push
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add garden_irrigation.yaml
          git diff --staged --quiet || git commit -m "chore: stamp blueprint version ${TAG} [skip ci]"
          git push
