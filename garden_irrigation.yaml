blueprint:
  name: Automated Garden Irrigation
  description: >
    # 🌱 Automated Garden Irrigation


    **Version: v0.10.0 (build 260516.0638)**


    Set it up once and your garden takes care of itself — whatever the weather. 🌦️


    <details>
    <summary><b>Features:</b> 👈</summary>

      - **Schedule-Based Triggering:**
          - Uses a HA Schedule helper for full control over days and times.
          - Any number of irrigation slots per day — configure directly in the HA UI, no blueprint changes needed.

      - **Weather Skip Logic:** 🌧️
          - Skips irrigation when today's accumulated rainfall exceeds your threshold.
          - Skips when rain probability is too high.
          - **Weather entity support:** combine actual rainfall + daily forecast precipitation for a smarter skip decision (works with DWD, OpenWeatherMap, Met.no, etc.).
          - **Temperature-based duration scaling:** irrigate longer on hot days — configurable threshold and multiplier.
          - All weather sensors are optional — leave empty to always irrigate.

      - **Additional Triggers:** 🌅⏰
          - Sun-based: trigger relative to sunset or sunrise with configurable offset.
          - Override time: fixed daily time that bypasses all skip logic.

      - **Skip Conditions:** 💧🌴
          - Vacation mode: one toggle suppresses all irrigation while away.
          - Skip if already watered: skips if the valve ran within a configurable time window.

      - **Motion Sensor Pause:** 🚶
          - Pauses the valve mid-run when motion is detected in the garden.
          - Resumes automatically after the area clears plus a configurable debounce delay.
          - Optional — leave empty to disable.

      - **Skip Logging & Notifications:** 🔔
          - Every skipped run is logged to the HA Logbook with the reason.
          - Optional push notification to HA, mobile app (iOS/Android), or Alexa.

      - **Multiple Zones:**
          - Use the same blueprint for multiple valves by creating one automation per zone.

    </details>


    📖 Full setup guide: https://github.com/nic2045/ha-garden-water


    ⚠️ Before using this blueprint, create a **Schedule helper** in
    Settings → Helpers → Schedule and configure your irrigation times there.


    Required = *
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:
    valve:
      name: "Irrigation Valve *"
      description: The irrigation valve — accepts switch or valve entities (any manufacturer)
      selector:
        entity:
          filter:
            - domain: switch
            - domain: valve
              device_class: water

    schedule_section:
      name: "Schedule *"
      icon: mdi:clock-outline
      description: >
        Select a Schedule helper that defines when to irrigate.
        Create one in Settings → Helpers → Schedule.
      input:
        schedule_entity:
          name: "Irrigation Schedule *"
          description: Schedule helper — defines irrigation days and times
          selector:
            entity:
              domain: schedule

        irrigation_duration:
          name: Irrigation Duration (minutes)
          description: How long the valve stays open per irrigation run
          default: 15
          selector:
            number:
              min: 1
              max: 60
              unit_of_measurement: min

    weather_section:
      name: Weather
      icon: mdi:weather-rainy
      description: Sensors and thresholds for weather-based skip logic.
      input:
        weather_entity:
          name: Weather Entity — Daily (optional)
          description: >
            Select your HA weather entity (e.g. weather.forecast_home or weather.dwd_weather_home)
            to use daily forecast data. When set, actual rainfall + forecast precipitation are
            combined for the skip decision. Leave empty to use only the sensors below.
          default: ""
          selector:
            entity:
              domain: weather

        hourly_weather_entity:
          name: "↳ Weather Entity — Hourly (optional)"
          description: >
            Optional second weather entity providing hourly forecast data
            (e.g. a DWD measurement station). When set, the blueprint sums precipitation
            over the forecast window below and uses that instead of the daily forecast value.
          default: ""
          selector:
            entity:
              domain: weather

        forecast_window_hours:
          name: "↳ Forecast Window (hours)"
          description: >
            Only applies when a Hourly Weather Entity is selected.
            Sum precipitation forecast over this many hours from now.
            Set this to match your watering interval — e.g. 24 h for a daily schedule,
            48 h if you water every other day. This answers the question:
            "Will it rain enough before the next watering is due?"
          default: 24
          selector:
            number:
              min: 6
              max: 72
              step: 6
              unit_of_measurement: h

        forecast_rain_threshold:
          name: "↳ Combined Rain Threshold (mm)"
          description: >
            Only applies when a Weather Entity is selected.
            Irrigation is skipped when actual rainfall + forecast precipitation ≥ this value.
          default: 10
          selector:
            number:
              min: 1
              max: 50
              unit_of_measurement: mm

        temperature_scaling_enabled:
          name: "↳ Temperature-Based Duration Scaling"
          description: >
            Only applies when a Weather Entity is selected.
            Increases irrigation duration when today's forecast temperature is high.
          default: false
          selector:
            boolean:

        high_temp_threshold:
          name: "↳ High Temperature Threshold (°C)"
          description: >
            Only applies when Temperature Scaling is enabled.
            Above this temperature the duration is multiplied by the factor below.
          default: 30
          selector:
            number:
              min: 15
              max: 45
              unit_of_measurement: "°C"

        high_temp_factor:
          name: "↳ Duration Multiplier at High Temperature"
          description: >
            Only applies when Temperature Scaling is enabled.
            Example: 1.5 = 50% longer when it's hot.
          default: 1.5
          selector:
            number:
              min: 1.1
              max: 3.0
              step: 0.1

        precipitation_sensor:
          name: Precipitation Sensor (optional)
          description: >
            Sensor for today's accumulated precipitation in mm (e.g. a DWD rain gauge).
            Also used in the combined check above when a Weather Entity is set.
            Leave empty to always irrigate regardless of measured rainfall.
          default: ""
          selector:
            entity:
              domain: sensor

        rain_threshold:
          name: "↳ Minimum Rainfall (mm)"
          description: >
            Only applies when a Precipitation Sensor is set.
            Irrigation is skipped when today's measured rainfall exceeds this threshold.
          default: 5
          selector:
            number:
              min: 1
              max: 20
              unit_of_measurement: mm

        rain_probability_sensor:
          name: Rain Probability Sensor (optional)
          description: >
            Sensor reporting precipitation probability in % (0–100).
            Leave empty to skip this check.
          default: ""
          selector:
            entity:
              domain: sensor

        rain_probability_threshold:
          name: "↳ Rain Probability Threshold (%)"
          description: >
            Only applies when a Rain Probability Sensor is set.
            Irrigation is skipped when rain probability exceeds this threshold.
          default: 70
          selector:
            number:
              min: 10
              max: 100
              unit_of_measurement: "%"

    additional_triggers_section:
      name: Additional Triggers
      icon: mdi:calendar-plus
      description: >
        Optional extra triggers alongside the Schedule helper.
        Sun-based triggers respect skip conditions. Override triggers bypass them all.
      collapsed: true
      input:
        override_enabled:
          name: Enable Override Time
          description: >
            Fixed daily time that always irrigates — bypasses all skip logic
            (weather, vacation, already watered).
          default: false
          selector:
            boolean:

        override_time:
          name: "↳ Override Time"
          description: "Only applies when Enable Override Time is on."
          default: "19:00:00"
          selector:
            time:

        sun_schedule_enabled:
          name: Enable Sun-Based Triggers
          description: Trigger irrigation relative to sunset or sunrise.
          default: false
          selector:
            boolean:

        sunset_enabled:
          name: "↳ Trigger at Sunset"
          description: "Only applies when Sun-Based Triggers are enabled above."
          default: true
          selector:
            boolean:

        sunset_offset:
          name: "↳ Sunset Offset"
          description: "Only applies when Trigger at Sunset is enabled."
          default: "-00:30:00"
          selector:
            select:
              options:
                - label: "2 hours before sunset"
                  value: "-02:00:00"
                - label: "1 hour before sunset"
                  value: "-01:00:00"
                - label: "30 min before sunset"
                  value: "-00:30:00"
                - label: "At sunset"
                  value: "+00:00:00"
                - label: "30 min after sunset"
                  value: "+00:30:00"
                - label: "1 hour after sunset"
                  value: "+01:00:00"

        sunrise_enabled:
          name: "↳ Trigger at Sunrise"
          description: "Only applies when Sun-Based Triggers are enabled above."
          default: false
          selector:
            boolean:

        sunrise_offset:
          name: "↳ Sunrise Offset"
          description: "Only applies when Trigger at Sunrise is enabled."
          default: "+00:30:00"
          selector:
            select:
              options:
                - label: "1 hour before sunrise"
                  value: "-01:00:00"
                - label: "30 min before sunrise"
                  value: "-00:30:00"
                - label: "At sunrise"
                  value: "+00:00:00"
                - label: "30 min after sunrise"
                  value: "+00:30:00"
                - label: "1 hour after sunrise"
                  value: "+01:00:00"
                - label: "2 hours after sunrise"
                  value: "+02:00:00"

        override_schedule:
          name: Override Schedule — Multiple Slots (optional)
          description: >
            Alternative to the single Override Time above.
            Select a second Schedule helper to define any number of override slots — each
            bypasses all skip conditions. Leave empty to disable.
          default: ""
          selector:
            entity:
              domain: schedule

    skip_conditions_section:
      name: Skip Conditions
      icon: mdi:cancel
      description: >
        Optional conditions that suppress irrigation beyond weather.
      collapsed: true
      input:
        vacation_boolean:
          name: Vacation Mode Helper (optional)
          description: When ON, all irrigation is suppressed. Leave empty to disable.
          default: ""
          selector:
            entity:
              domain: input_boolean

        skip_if_watered:
          name: Enable "Skip if Already Watered"
          description: Skips irrigation if the valve already ran within a recent time window.
          default: false
          selector:
            boolean:

        watered_window_hours:
          name: "↳ Skip Window (hours)"
          description: "Only applies when Skip if Already Watered is enabled. Skip if the valve was on within this many hours."
          default: 12
          selector:
            number:
              min: 1
              max: 48
              unit_of_measurement: h

        min_run_minutes:
          name: "↳ Minimum Run Duration (minutes)"
          description: "Only applies when Skip if Already Watered is enabled. Requires the duration helper below."
          default: 5
          selector:
            number:
              min: 1
              max: 60
              unit_of_measurement: min

        last_run_helper:
          name: "↳ Last Run Duration Helper (optional)"
          description: >
            Only applies when Skip if Already Watered is enabled.
            Create an input_number helper (min 0, max 120, unit min) — the blueprint writes the duration here after each run.
          default: ""
          selector:
            entity:
              domain: input_number

    motion_section:
      name: Motion Sensor
      icon: mdi:motion-sensor
      description: Optional — pauses irrigation when motion is detected.
      collapsed: true
      input:
        motion_sensor:
          name: Motion Sensor (optional)
          description: When motion is detected the valve is paused until the area is clear
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: motion

        debounce_seconds:
          name: "↳ Debounce Time (seconds)"
          description: "Only applies when a Motion Sensor is configured. Extra wait time after motion clears."
          default: 30
          selector:
            number:
              min: 5
              max: 120
              unit_of_measurement: s

    notification_section:
      name: Notifications
      icon: mdi:bell-outline
      description: >
        Every skipped run is always logged to the HA Logbook.
        Enable notifications to also receive an active alert.
      collapsed: true
      input:
        notify_on_skip:
          name: Enable skip notifications
          description: When enabled, sends a notification whenever a run is skipped. Skipped runs are always logged to the HA Logbook regardless of this setting.
          default: false
          selector:
            boolean:

        notify_service:
          name: "↳ Notification target (optional)"
          description: >
            Only applies when notifications are enabled above.
            Additional service e.g. notify.mobile_app_iphone or notify.alexa_media_echo_dot.
          default: ""
          selector:
            text:

variables:
  valve_entity: !input valve
  irrigation_duration: !input irrigation_duration
  rain_threshold: !input rain_threshold
  rain_probability_threshold: !input rain_probability_threshold
  precipitation_sensor: !input precipitation_sensor
  rain_probability_sensor: !input rain_probability_sensor
  vacation_boolean: !input vacation_boolean
  motion_sensor: !input motion_sensor
  debounce_seconds: !input debounce_seconds
  notify_on_skip: !input notify_on_skip
  notify_service: !input notify_service
  sun_schedule_enabled: !input sun_schedule_enabled
  sunset_enabled: !input sunset_enabled
  sunrise_enabled: !input sunrise_enabled
  skip_if_watered: !input skip_if_watered
  watered_window_hours: !input watered_window_hours
  min_run_minutes: !input min_run_minutes
  last_run_helper: !input last_run_helper
  override_schedule: !input override_schedule
  override_enabled: !input override_enabled
  weather_entity: !input weather_entity
  hourly_weather_entity: !input hourly_weather_entity
  forecast_window_hours: !input forecast_window_hours
  forecast_rain_threshold: !input forecast_rain_threshold
  temperature_scaling_enabled: !input temperature_scaling_enabled
  high_temp_threshold: !input high_temp_threshold
  high_temp_factor: !input high_temp_factor

trigger:
  - platform: state
    entity_id: !input schedule_entity
    to: "on"
    id: schedule

  - platform: sun
    event: sunset
    offset: !input sunset_offset
    id: sunset

  - platform: sun
    event: sunrise
    offset: !input sunrise_offset
    id: sunrise

  - platform: time
    at: !input override_time
    id: override_time
    alias: "Override Time"

action:
  - condition: template
    value_template: >
      {{ trigger.id == 'schedule' or
         (override_enabled and trigger.id == 'override_time') or
         (sun_schedule_enabled and
          ((trigger.id == 'sunset' and sunset_enabled) or
           (trigger.id == 'sunrise' and sunrise_enabled))) }}

  - if:
      - condition: template
        value_template: "{{ weather_entity != '' }}"
    then:
      - service: weather.get_forecasts
        target:
          entity_id: "{{ weather_entity }}"
        data:
          type: daily
        response_variable: weather_forecast_raw
      - variables:
          forecast_precipitation: "{{ weather_forecast_raw[weather_entity].forecast[0].precipitation | float(0) }}"
          forecast_temperature: "{{ weather_forecast_raw[weather_entity].forecast[0].temperature | float(0) }}"
    else:
      - variables:
          forecast_precipitation: 0
          forecast_temperature: 0

  - if:
      - condition: template
        value_template: "{{ hourly_weather_entity != '' }}"
    then:
      - service: weather.get_forecasts
        target:
          entity_id: "{{ hourly_weather_entity }}"
        data:
          type: hourly
        response_variable: hourly_forecast_raw
      - variables:
          hourly_precipitation_today: >
            {% set ns = namespace(total=0) %}
            {% set now_ts = as_timestamp(now()) %}
            {% set window_end = now_ts + forecast_window_hours | int * 3600 %}
            {% for hour in hourly_forecast_raw[hourly_weather_entity].forecast %}
              {% set ts = as_timestamp(hour.datetime) %}
              {% if ts >= now_ts and ts < window_end %}
                {% set ns.total = ns.total + hour.precipitation | float(0) %}
              {% endif %}
            {% endfor %}
            {{ ns.total | round(2) }}
    else:
      - variables:
          hourly_precipitation_today: 0

  - variables:
      skip_reason: >
        {% if trigger.id in ['override_schedule', 'override_time'] %}
        {% elif vacation_boolean != '' and is_state(vacation_boolean, 'on') %}
          Vacation mode is active.
        {% elif skip_if_watered and
            (now() - states[valve_entity].last_changed).total_seconds() < watered_window_hours | int * 3600 and
            (last_run_helper == '' or states(last_run_helper) | float(0) >= min_run_minutes | float) %}
          Already watered — last run was {{ ((now() - states[valve_entity].last_changed).total_seconds() / 60) | int }} min ago.
        {% elif (weather_entity != '' or hourly_weather_entity != '') and
            ((states(precipitation_sensor) | float(0) if precipitation_sensor != '' else 0)
             + (hourly_precipitation_today if hourly_weather_entity != '' else forecast_precipitation)) >= forecast_rain_threshold | float %}
          {% set actual = (states(precipitation_sensor) | float(0) if precipitation_sensor != '' else 0) %}
          {% set rain_fc = hourly_precipitation_today if hourly_weather_entity != '' else forecast_precipitation %}
          Combined rain {{ (actual + rain_fc) | round(1) }} mm ({{ actual | round(1) }} mm actual + {{ rain_fc | round(1) }} mm {% if hourly_weather_entity != '' %}forecast next {{ forecast_window_hours }} h{% else %}daily forecast{% endif %}) exceeds threshold {{ forecast_rain_threshold }} mm.
        {% elif precipitation_sensor != '' and states(precipitation_sensor) | float(0) >= rain_threshold | float %}
          Rainfall {{ states(precipitation_sensor) | float | round(1) }} mm exceeds threshold {{ rain_threshold }} mm.
        {% elif rain_probability_sensor != '' and states(rain_probability_sensor) | float(0) >= rain_probability_threshold | float %}
          Rain probability {{ states(rain_probability_sensor) | float | round(0) | int }}% exceeds threshold {{ rain_probability_threshold }}%.
        {% else %}
        {% endif %}

  - variables:
      effective_duration: >
        {% if weather_entity != '' and temperature_scaling_enabled and forecast_temperature >= high_temp_threshold | float %}
          {{ (irrigation_duration | int * high_temp_factor | float) | round(0) | int }}
        {% else %}
          {{ irrigation_duration | int }}
        {% endif %}

  - if:
      - condition: template
        value_template: "{{ skip_reason | trim != '' }}"
    then:
      - service: logbook.log
        data:
          name: "Garden Irrigation"
          entity_id: "{{ valve_entity }}"
          message: "Skipped | Trigger: {{ trigger.id }} | {{ skip_reason | trim }}"

      - if:
          - condition: template
            value_template: "{{ notify_on_skip }}"
        then:
          - service: persistent_notification.create
            data:
              title: "Irrigation skipped"
              message: "{{ skip_reason | trim }}"
              notification_id: "irrigation_skip"

          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "Irrigation skipped"
                  message: "{{ skip_reason | trim }}"
    else:
      - service: logbook.log
        data:
          name: "Garden Irrigation"
          entity_id: "{{ valve_entity }}"
          message: >
            Starting {{ effective_duration }} min | Trigger: {{ trigger.id }}{% if weather_entity != '' and temperature_scaling_enabled and forecast_temperature >= high_temp_threshold | float %} | Temp: {{ forecast_temperature }}°C — scaling active (×{{ high_temp_factor }}){% endif %}

      - service: switch.turn_on
        target:
          entity_id: !input valve

      - repeat:
          count: "{{ (effective_duration | int * 60 / 5) | int }}"
          sequence:
            - delay:
                seconds: 5
            - if:
                - condition: template
                  value_template: >
                    {{ motion_sensor != '' and is_state(motion_sensor, 'on') }}
              then:
                - service: switch.turn_off
                  target:
                    entity_id: !input valve
                - wait_template: "{{ is_state(motion_sensor, 'off') }}"
                  timeout:
                    minutes: 10
                - delay:
                    seconds: !input debounce_seconds
                - service: switch.turn_on
                  target:
                    entity_id: !input valve

      - service: switch.turn_off
        target:
          entity_id: !input valve

      - if:
          - condition: template
            value_template: "{{ last_run_helper != '' }}"
        then:
          - service: input_number.set_value
            target:
              entity_id: "{{ last_run_helper }}"
            data:
              value: "{{ effective_duration }}"

      - service: logbook.log
        data:
          name: "Garden Irrigation"
          entity_id: "{{ valve_entity }}"
          message: >
            Ran {{ effective_duration }} min | Trigger: {{ trigger.id }} |
            DWD: {{ states(precipitation_sensor) | float(0) | round(1) if precipitation_sensor != '' else 'n/a' }} mm |
            Forecast: {{ (hourly_precipitation_today if hourly_weather_entity != '' else forecast_precipitation) | round(1) }} mm |
            Combined: {{ ((states(precipitation_sensor) | float(0) if precipitation_sensor != '' else 0) + (hourly_precipitation_today if hourly_weather_entity != '' else forecast_precipitation)) | round(1) }} mm (threshold {{ forecast_rain_threshold }} mm) |
            Temp: {{ forecast_temperature }}°C{% if weather_entity != '' and temperature_scaling_enabled and forecast_temperature >= high_temp_threshold | float %} — scaling active (×{{ high_temp_factor }}){% endif %}

mode: single
max_exceeded: silent
