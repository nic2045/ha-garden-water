blueprint:
  name: Garden Irrigation with Weather Control
  description: >
    Irrigates automatically based on a Schedule helper (any days and times).
    Skips irrigation when enough rain has fallen or rain probability is high.
    Supports vacation mode and an optional motion sensor with debounce.
    Requires a Schedule helper created in Settings → Helpers → Schedule.
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:
    valve:
      name: Bewässerungsventil
      description: Switch entity of the SONOFF SWV valve
      selector:
        entity:
          domain: switch

    schedule_section:
      name: Schedule
      icon: mdi:clock-outline
      description: >
        Select a Schedule helper that defines when to irrigate.
        Create one in Settings → Helpers → Schedule.
      input:
        schedule_entity:
          name: Bewässerungsplan
          description: Schedule helper — defines irrigation days and times
          selector:
            entity:
              domain: schedule

        irrigation_duration:
          name: Bewässerungsdauer (Minuten)
          description: How long the valve stays open per irrigation run
          default: 15
          selector:
            number:
              min: 1
              max: 60
              unit_of_measurement: min

    weather_section:
      name: Weather
      icon: mdi:weather-rainy
      description: Sensors and thresholds for weather-based skip logic.
      input:
        precipitation_sensor:
          name: Niederschlag-Sensor
          description: Sensor for accumulated precipitation in mm. Leave empty to always irrigate regardless of rainfall.
          default: ""
          selector:
            entity:
              domain: sensor

        rain_threshold:
          name: Mindest-Regenmenge (mm)
          description: Irrigation is skipped when today's rainfall exceeds this threshold
          default: 5
          selector:
            number:
              min: 1
              max: 20
              unit_of_measurement: mm

        rain_probability_sensor:
          name: Regenwahrscheinlichkeit-Sensor
          description: Sensor reporting precipitation probability in % (0–100). Leave empty to skip this check.
          default: ""
          selector:
            entity:
              domain: sensor

        rain_probability_threshold:
          name: Regenwahrscheinlichkeit (%)
          description: Irrigation is skipped when rain probability exceeds this threshold
          default: 70
          selector:
            number:
              min: 10
              max: 100
              unit_of_measurement: "%"

    vacation_section:
      name: Vacation Mode
      icon: mdi:palm-tree
      description: Optional — suppresses all irrigation while away.
      collapsed: true
      input:
        vacation_boolean:
          name: Urlaubsmodus Helper (optional)
          description: When ON, all irrigation is suppressed. Leave empty to disable.
          default: ""
          selector:
            entity:
              domain: input_boolean

    motion_section:
      name: Motion Sensor
      icon: mdi:motion-sensor
      description: Optional — pauses irrigation when motion is detected.
      collapsed: true
      input:
        motion_sensor:
          name: Bewegungssensor (optional)
          description: When motion is detected the valve is paused until the area is clear
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: motion

        debounce_seconds:
          name: Debounce-Zeit (Sekunden)
          description: Extra wait time after motion clears before reopening the valve
          default: 30
          selector:
            number:
              min: 5
              max: 120
              unit_of_measurement: s

variables:
  irrigation_duration: !input irrigation_duration
  rain_threshold: !input rain_threshold
  rain_probability_threshold: !input rain_probability_threshold
  precipitation_sensor: !input precipitation_sensor
  rain_probability_sensor: !input rain_probability_sensor
  vacation_boolean: !input vacation_boolean
  motion_sensor: !input motion_sensor
  debounce_seconds: !input debounce_seconds

trigger:
  - platform: state
    entity_id: !input schedule_entity
    to: "on"

condition:
  - condition: template
    value_template: >
      {{ vacation_boolean == '' or is_state(vacation_boolean, 'off') }}
  - condition: template
    value_template: >
      {{ precipitation_sensor == '' or states(precipitation_sensor) | float(0) < rain_threshold | float }}
  - condition: template
    value_template: >
      {{ rain_probability_sensor == '' or states(rain_probability_sensor) | float(0) < rain_probability_threshold | float }}

action:
  - service: switch.turn_on
    target:
      entity_id: !input valve

  - repeat:
      count: "{{ (irrigation_duration | int * 60 / 5) | int }}"
      sequence:
        - delay:
            seconds: 5
        - if:
            - condition: template
              value_template: >
                {{ motion_sensor != '' and is_state(motion_sensor, 'on') }}
          then:
            - service: switch.turn_off
              target:
                entity_id: !input valve
            - wait_for_trigger:
                - platform: state
                  entity_id: "{{ motion_sensor }}"
                  to: "off"
              timeout:
                minutes: 10
            - delay:
                seconds: !input debounce_seconds
            - service: switch.turn_on
              target:
                entity_id: !input valve

  - service: switch.turn_off
    target:
      entity_id: !input valve

mode: single
max_exceeded: silent
