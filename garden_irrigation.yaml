blueprint:
  name: Automated Garden Irrigation
  description: >
    # 🌱 Automated Garden Irrigation


    **Version: v0.9.1 (build 260510.1200)**


    Set it up once and your garden takes care of itself — whatever the weather. 🌦️


    <details>
    <summary><b>Features:</b> 👈</summary>

      - **Schedule-Based Triggering:**
          - Uses a HA Schedule helper for full control over days and times.
          - Any number of irrigation slots per day — configure directly in the HA UI, no blueprint changes needed.

      - **Sun-Based Schedule:** 🌅
          - Optionally trigger irrigation relative to **sunset** or **sunrise**.
          - Configurable offset (before / after) per event — e.g. "30 min before sunset".
          - Works independently alongside the Schedule helper.

      - **Weather Skip Logic:** 🌧️
          - Skips irrigation when today's accumulated rainfall exceeds your threshold.
          - Skips when rain probability is too high.
          - Both weather sensors are optional — leave empty to always irrigate.

      - **Vacation Mode:** 🌴
          - One toggle suppresses all irrigation while you're away.
          - Optional — leave empty to disable.

      - **Motion Sensor Pause:** 🚶
          - Pauses the valve mid-run when motion is detected in the garden.
          - Resumes automatically after the area clears plus a configurable debounce delay.
          - Optional — leave empty to disable.

      - **Skip Logging & Notifications:** 🔔
          - Every skipped run is logged to the HA Logbook with the reason.
          - Optional push notification to HA, mobile app (iOS/Android), or Alexa.

      - **Multiple Zones:**
          - Use the same blueprint for multiple valves by creating one automation per zone.

    </details>


    📖 Full setup guide: https://github.com/nic2045/ha-garden-water


    ⚠️ Before using this blueprint, create a **Schedule helper** in
    Settings → Helpers → Schedule and configure your irrigation times there.


    Required = *
  domain: automation
  homeassistant:
    min_version: "2024.6.0"
  input:
    valve:
      name: "Irrigation Valve *"
      description: The irrigation valve — accepts switch or valve entities (any manufacturer)
      selector:
        entity:
          filter:
            - domain: switch
            - domain: valve
              device_class: water

    schedule_section:
      name: "Schedule *"
      icon: mdi:clock-outline
      description: >
        Select a Schedule helper that defines when to irrigate.
        Create one in Settings → Helpers → Schedule.
      input:
        schedule_entity:
          name: "Irrigation Schedule *"
          description: Schedule helper — defines irrigation days and times
          selector:
            entity:
              domain: schedule

        irrigation_duration:
          name: Irrigation Duration (minutes)
          description: How long the valve stays open per irrigation run
          default: 15
          selector:
            number:
              min: 1
              max: 60
              unit_of_measurement: min

    sun_schedule_section:
      name: Sun-Based Schedule
      icon: mdi:weather-sunset
      description: >
        Optionally trigger irrigation relative to sunset or sunrise.
        These triggers are active **in addition** to the Schedule helper above.
        Leave disabled if you only want schedule-based irrigation.
      collapsed: true
      input:
        sun_schedule_enabled:
          name: Enable Sun-Based Schedule
          description: When enabled, the sunset and/or sunrise triggers below become active.
          default: false
          selector:
            boolean:

        sunset_enabled:
          name: Trigger at Sunset
          description: Start an irrigation run relative to sunset.
          default: true
          selector:
            boolean:

        sunset_offset:
          name: Sunset Offset
          description: When to start irrigation relative to sunset.
          default: "-00:30:00"
          selector:
            select:
              options:
                - label: "2 hours before sunset"
                  value: "-02:00:00"
                - label: "1 hour before sunset"
                  value: "-01:00:00"
                - label: "30 min before sunset"
                  value: "-00:30:00"
                - label: "At sunset"
                  value: "+00:00:00"
                - label: "30 min after sunset"
                  value: "+00:30:00"
                - label: "1 hour after sunset"
                  value: "+01:00:00"

        sunrise_enabled:
          name: Trigger at Sunrise
          description: Start an irrigation run relative to sunrise.
          default: false
          selector:
            boolean:

        sunrise_offset:
          name: Sunrise Offset
          description: When to start irrigation relative to sunrise.
          default: "+00:30:00"
          selector:
            select:
              options:
                - label: "1 hour before sunrise"
                  value: "-01:00:00"
                - label: "30 min before sunrise"
                  value: "-00:30:00"
                - label: "At sunrise"
                  value: "+00:00:00"
                - label: "30 min after sunrise"
                  value: "+00:30:00"
                - label: "1 hour after sunrise"
                  value: "+01:00:00"
                - label: "2 hours after sunrise"
                  value: "+02:00:00"

    weather_section:
      name: Weather
      icon: mdi:weather-rainy
      description: Sensors and thresholds for weather-based skip logic.
      input:
        precipitation_sensor:
          name: Precipitation Sensor
          description: Sensor for accumulated precipitation in mm. Leave empty to always irrigate regardless of rainfall.
          default: ""
          selector:
            entity:
              domain: sensor

        rain_threshold:
          name: Minimum Rainfall (mm)
          description: Irrigation is skipped when today's rainfall exceeds this threshold
          default: 5
          selector:
            number:
              min: 1
              max: 20
              unit_of_measurement: mm

        rain_probability_sensor:
          name: Rain Probability Sensor
          description: Sensor reporting precipitation probability in % (0–100). Leave empty to skip this check.
          default: ""
          selector:
            entity:
              domain: sensor

        rain_probability_threshold:
          name: Rain Probability Threshold (%)
          description: Irrigation is skipped when rain probability exceeds this threshold
          default: 70
          selector:
            number:
              min: 10
              max: 100
              unit_of_measurement: "%"

    vacation_section:
      name: Vacation Mode
      icon: mdi:palm-tree
      description: Optional — suppresses all irrigation while away.
      collapsed: true
      input:
        vacation_boolean:
          name: Vacation Mode Helper (optional)
          description: When ON, all irrigation is suppressed. Leave empty to disable.
          default: ""
          selector:
            entity:
              domain: input_boolean

    motion_section:
      name: Motion Sensor
      icon: mdi:motion-sensor
      description: Optional — pauses irrigation when motion is detected.
      collapsed: true
      input:
        motion_sensor:
          name: Motion Sensor (optional)
          description: When motion is detected the valve is paused until the area is clear
          default: ""
          selector:
            entity:
              domain: binary_sensor
              device_class: motion

        debounce_seconds:
          name: Debounce Time (seconds)
          description: Extra wait time after motion clears before reopening the valve
          default: 30
          selector:
            number:
              min: 5
              max: 120
              unit_of_measurement: s

    notification_section:
      name: Notifications
      icon: mdi:bell-outline
      description: >
        Every skipped run is always logged to the HA Logbook.
        Enable notifications to also receive an active alert.
      collapsed: true
      input:
        notify_on_skip:
          name: Notify when irrigation is skipped
          description: Sends a notification whenever a run is skipped (weather, vacation).
          default: true
          selector:
            boolean:

        notify_service:
          name: Notification target (optional)
          description: >
            Additional notification service to call, e.g. notify.mobile_app_iphone
            or notify.alexa_media_echo_dot. Leave empty for HA notifications only.
          default: ""
          selector:
            text:

variables:
  irrigation_duration: !input irrigation_duration
  rain_threshold: !input rain_threshold
  rain_probability_threshold: !input rain_probability_threshold
  precipitation_sensor: !input precipitation_sensor
  rain_probability_sensor: !input rain_probability_sensor
  vacation_boolean: !input vacation_boolean
  motion_sensor: !input motion_sensor
  debounce_seconds: !input debounce_seconds
  notify_on_skip: !input notify_on_skip
  notify_service: !input notify_service
  sun_schedule_enabled: !input sun_schedule_enabled
  sunset_enabled: !input sunset_enabled
  sunrise_enabled: !input sunrise_enabled

trigger:
  - platform: state
    entity_id: !input schedule_entity
    to: "on"
    id: schedule

  - platform: sun
    event: sunset
    offset: !input sunset_offset
    id: sunset

  - platform: sun
    event: sunrise
    offset: !input sunrise_offset
    id: sunrise

action:
  - condition: template
    value_template: >
      {{ trigger.id == 'schedule' or
         (sun_schedule_enabled and
          ((trigger.id == 'sunset' and sunset_enabled) or
           (trigger.id == 'sunrise' and sunrise_enabled))) }}

  - variables:
      skip_reason: >
        {% if vacation_boolean != '' and is_state(vacation_boolean, 'on') %}
          Vacation mode is active.
        {% elif precipitation_sensor != '' and states(precipitation_sensor) | float(0) >= rain_threshold | float %}
          Rainfall {{ states(precipitation_sensor) | float | round(1) }} mm exceeds threshold {{ rain_threshold }} mm.
        {% elif rain_probability_sensor != '' and states(rain_probability_sensor) | float(0) >= rain_probability_threshold | float %}
          Rain probability {{ states(rain_probability_sensor) | float | round(0) | int }}% exceeds threshold {{ rain_probability_threshold }}%.
        {% else %}
        {% endif %}

  - if:
      - condition: template
        value_template: "{{ skip_reason | trim != '' }}"
    then:
      - service: logbook.log
        data:
          name: "Garden Irrigation"
          message: "Skipped — {{ skip_reason | trim }}"
          entity_id: !input valve

      - if:
          - condition: template
            value_template: "{{ notify_on_skip }}"
        then:
          - service: persistent_notification.create
            data:
              title: "Irrigation skipped"
              message: "{{ skip_reason | trim }}"
              notification_id: "irrigation_skip"

          - if:
              - condition: template
                value_template: "{{ notify_service != '' }}"
            then:
              - service: "{{ notify_service }}"
                data:
                  title: "Irrigation skipped"
                  message: "{{ skip_reason | trim }}"
    else:
      - service: switch.turn_on
        target:
          entity_id: !input valve

      - repeat:
          count: "{{ (irrigation_duration | int * 60 / 5) | int }}"
          sequence:
            - delay:
                seconds: 5
            - if:
                - condition: template
                  value_template: >
                    {{ motion_sensor != '' and is_state(motion_sensor, 'on') }}
              then:
                - service: switch.turn_off
                  target:
                    entity_id: !input valve
                - wait_template: "{{ is_state(motion_sensor, 'off') }}"
                  timeout:
                    minutes: 10
                - delay:
                    seconds: !input debounce_seconds
                - service: switch.turn_on
                  target:
                    entity_id: !input valve

      - service: switch.turn_off
        target:
          entity_id: !input valve

mode: single
max_exceeded: silent
