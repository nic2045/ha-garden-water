blueprint:
  name: Garden Irrigation with DWD Weather Control
  description: >
    Irrigates automatically in the morning and in the evening (after sunset).
    Skips irrigation when enough rain has fallen or rain probability is high.
    Supports vacation mode and an optional motion sensor with debounce.
  domain: automation
  min_ha_version: "2026.1.0"
  input:
    ventil:
      name: Bewässerungsventil
      description: Switch entity of the SONOFF SWV valve
      selector:
        entity:
          domain: switch

    morgenzeit:
      name: Morgen-Bewässerungszeit
      description: Time for the morning irrigation run
      default: "06:00:00"
      selector:
        time:

    abend_offset:
      name: Offset nach Sonnenuntergang
      description: "Offset after sunset in HH:MM:SS format (e.g. 00:30:00 for 30 minutes)"
      default: "00:30:00"
      selector:
        text:

    bewaesserungsdauer:
      name: Bewässerungsdauer (Minuten)
      description: How long the valve stays open (minutes)
      default: 15
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: min

    regen_menge:
      name: Mindest-Regenmenge (mm)
      description: Irrigation is skipped when today's rainfall exceeds this threshold
      default: 5
      selector:
        number:
          min: 1
          max: 20
          unit_of_measurement: mm

    regen_wahrscheinlichkeit:
      name: Regenwahrscheinlichkeit (%)
      description: Irrigation is skipped when rain probability exceeds this threshold
      default: 70
      selector:
        number:
          min: 10
          max: 100
          unit_of_measurement: "%"

    niederschlag_sensor:
      name: Niederschlag-Sensor
      description: Sensor reporting today's accumulated precipitation in mm (device class: precipitation)
      selector:
        entity:
          domain: sensor
          device_class: precipitation

    wahrscheinlichkeit_sensor:
      name: Regenwahrscheinlichkeit-Sensor
      description: Sensor reporting precipitation probability in % (0–100)
      selector:
        entity:
          domain: sensor

    urlaub_boolean:
      name: Urlaubsmodus Helper
      description: When ON, all irrigation is suppressed (input_boolean.garten_urlaub)
      default: input_boolean.garten_urlaub
      selector:
        entity:
          domain: input_boolean

    bewegungssensor:
      name: Bewegungssensor (optional)
      description: When motion is detected the valve is paused until the area is clear
      default: ""
      selector:
        entity:
          domain: binary_sensor
          device_class: motion

    debounce_sekunden:
      name: Debounce-Zeit (Sekunden)
      description: Extra wait time after motion clears before reopening the valve
      default: 30
      selector:
        number:
          min: 5
          max: 120
          unit_of_measurement: s

variables:
  ventil: !input ventil
  bewaesserungsdauer: !input bewaesserungsdauer
  regen_menge: !input regen_menge
  regen_wahrscheinlichkeit: !input regen_wahrscheinlichkeit
  niederschlag_sensor: !input niederschlag_sensor
  wahrscheinlichkeit_sensor: !input wahrscheinlichkeit_sensor
  urlaub_boolean: !input urlaub_boolean
  bewegungssensor: !input bewegungssensor
  debounce_sekunden: !input debounce_sekunden

trigger:
  - platform: time
    at: !input morgenzeit
    id: morgen

  - platform: sun
    event: sunset
    offset: !input abend_offset
    id: abend

condition:
  - condition: state
    entity_id: !input urlaub_boolean
    state: "off"
  - condition: template
    value_template: >
      {{ states(niederschlag_sensor) | float(0) < regen_menge | float }}
  - condition: template
    value_template: >
      {{ states(wahrscheinlichkeit_sensor) | float(0) < regen_wahrscheinlichkeit | float }}

action:
  - service: switch.turn_on
    target:
      entity_id: !input ventil

  - repeat:
      count: "{{ (bewaesserungsdauer | int * 60 / 5) | int }}"
      sequence:
        - delay:
            seconds: 5
        - if:
            - condition: template
              value_template: >
                {{ bewegungssensor != '' and is_state(bewegungssensor, 'on') }}
          then:
            - service: switch.turn_off
              target:
                entity_id: !input ventil
            - wait_for_trigger:
                - platform: state
                  entity_id: "{{ bewegungssensor }}"
                  to: "off"
              timeout:
                minutes: 10
            - delay:
                seconds: !input debounce_sekunden
            - service: switch.turn_on
              target:
                entity_id: !input ventil

  - service: switch.turn_off
    target:
      entity_id: !input ventil

mode: single
max_exceeded: silent
